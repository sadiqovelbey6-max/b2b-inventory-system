name: CI

on:
  push:
    branches: ['main', 'master']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run unit tests with coverage
        run: npm run test -- --ci --runInBand --coverage

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage
          if-no-files-found: warn

      - name: Start test services
        run: |
          docker compose -f ../docker-compose.test.yml up -d mongodb_test redis_test
          until docker compose -f ../docker-compose.test.yml exec -T mongodb_test mongosh --eval "db.adminCommand('ping')"; do sleep 2; done
          until docker compose -f ../docker-compose.test.yml exec -T redis_test redis-cli ping; do sleep 2; done

      - name: Run e2e tests
        env:
          PORT: 4001
          CORS_ORIGINS: http://localhost:4200
          JWT_ACCESS_SECRET: test-access-secret
          JWT_REFRESH_SECRET: test-refresh-secret
          MONGODB_URI: mongodb://127.0.0.1:27018/b2b_inventory_test
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6380
        run: npm run test:e2e -- --ci --runInBand

      - name: Stop test services
        if: always()
        run: docker compose -f ../docker-compose.test.yml down -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
          if-no-files-found: warn

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: frontend
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build preview bundle
        run: npm run build

      - name: Start preview server
        run: npm run preview -- --host 0.0.0.0 --port 4173 &

      - name: Wait for preview
        run: npx wait-on http://127.0.0.1:4173

      - name: Run Cypress end-to-end tests
        run: npx cypress run --config baseUrl=http://127.0.0.1:4173

      - name: Run Lighthouse audit
        run: npm run lighthouse

      - name: Upload Cypress artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-artifacts
          path: |
            frontend/cypress/videos
            frontend/cypress/screenshots

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: frontend/lighthouse-report.html
          if-no-files-found: warn

